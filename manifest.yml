app_id:
name: Zscaler Internet Access
description: Integrates Zscaler Internet Access (ZIA) with Falcon's Threat Intelligence and Falcon Next-Gen SIEM to achieve more effective inline blocking.
logo: app_docs/images/logo.png
vendor: "Zscaler"
vendor_products: []
use_case: Cloud security
manifest_version: "2023-05-09"
ignored:
  - e2e
  - e2e/.+
ui:
    homepage: ""
    extensions: []
    pages: {}
    dashboards: {}
    navigation: {}
api_integrations:
    - id:
      name: ZIA Cloud Service API
      description: ""
      path: api-integrations/ZIA_Cloud_Service_API.json
rtr_scripts: []
collections: []
auth:
    scopes:
        - falconx-indicators:read
        - workflow:read
        - iocs:write
        - app-logs:write
        - workflow:write
        - api-integrations:read
        - api-integrations:write
        - app-logs:read
    permissions: {}
    roles: []
functions:
    - id:
      name: iterations
      config: null
      description: Utility function for controlling number of pull-lookup-urls iterations in fusion workflow
      path: functions/iterations
      environment_variables: {}
      handlers:
        - name: iterations-handler
          description: Utility function for controlling number of pull-lookup-urls iterations in fusion workflow
          method: GET
          api_path: /iterations
          payload_type: ""
          request_schema: schemas/inputSchema.json
          response_schema: schemas/outputSchema.json
          workflow_integration:
            id:
            disruptive: false
            system_action: false
            tags: []
          permissions: []
      language: python
    - id:
      name: extract
      config: null
      description: Utility function for extracting URLs to be pushed to Zscaler
      path: functions/extract
      environment_variables: {}
      handlers:
        - name: extract-handler
          description: Utility function for extracting URLs to be pushed to Zscaler
          method: POST
          api_path: /extract
          payload_type: ""
          request_schema: schemas/inputSchema.json
          response_schema: schemas/outputSchema.json
          workflow_integration:
            id:
            disruptive: false
            system_action: false
            tags: []
          permissions: []
      language: python
    - id:
      name: push-iocs-to-zia
      config: null
      description: Utility function for pushing IOCs to ZIA
      path: functions/push-iocs-to-zia
      environment_variables: {}
      handlers:
        - name: push-iocs-to-zia-handler
          description: Utility function for pushing IOCs to ZIA
          method: POST
          api_path: /push-iocs-to-zia
          payload_type: ""
          request_schema: schemas/inputSchema.json
          response_schema: schemas/outputSchema.json
          workflow_integration:
            id:
            disruptive: false
            system_action: false
            tags: []
          permissions: []
      language: python
      max_exec_duration_seconds: 900
    - id:
      name: get-url-category
      config: null
      description: Utility function for getting URL category name and ID using Zscaler API
      path: functions/get-url-category
      environment_variables: {}
      handlers:
        - name: get-url-category
          description: Utility function for getting URL category name and ID using Zscaler API
          method: GET
          api_path: /get-url-category
          payload_type: ""
          request_schema: schemas/inputSchema.json
          response_schema: schemas/outputSchema.json
          workflow_integration:
            id:
            disruptive: false
            system_action: false
            tags: []
          permissions: []
      language: python
    - id:
      name: pull-lookup-urls
      config: null
      description: Pull high-confidence malicious URLs from Falcon Intel Indicators database and lookup using Zscaler API
      path: functions/pull-lookup-urls
      environment_variables: {}
      handlers:
        - name: pull-lookup-urls
          description: Pull high-confidence malicious URLs from Falcon Intel Indicators database and lookup using Zscaler API
          method: GET
          api_path: /pull-lookup-urls
          payload_type: ""
          request_schema: schemas/inputSchema.json
          response_schema: schemas/outputSchema.json
          workflow_integration:
            id:
            disruptive: false
            system_action: false
            tags: []
          permissions: []
      language: python
      max_exec_duration_seconds: 900
workflows:
    - id:
      name: Falcon-Zscaler Integration
      path: workflows/ZscalerIntegration.yml
      permissions: []
parsers: []
logscale:
    saved_searches: []
lookup_files: []
docs:
  id:
  path: app_docs
  entrypoint: README.md
  links:
    - images/apiSettings.png
    - images/workflowSetting.png
